<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#6e6e6e;
    }

    /* Navbar */
    .navbar{
        background:#e9e9e9;
        padding:12px;
        text-align:center;
        border-bottom:2px solid #ccc;
    }

    .navbar button{
        padding:10px 40px;
        margin:0 10px;
        font-size:18px;
        border:2px solid #888;
        background:#f5f5f5;
        cursor:pointer;
        border-radius:3px;
    }

    /* Container */
    .container{
        width:500px;
        margin:40px auto;
        color:black;
    }

    h1{
        margin-bottom:40px;
        font-size:42px;
        font-weight:bold;
    }

    .input-group{
        margin-bottom:35px;
        font-size:24px;
    }

    .input-group input{
        width:220px;
        height:40px;
        font-size:22px;
        padding:5px;
        margin-left:15px;
    }

    .btn{
        display:block;
        margin:20px 0 40px 90px;
        padding:10px 30px;
        font-size:22px;
        border-radius:10px;
        border:3px solid #444;
        cursor:pointer;
        background:white;
    }

    #result{
        font-size:26px;
        font-weight:bold;
        margin-bottom:30px;
    }

    h2{
        margin-bottom:20px;
        font-size:32px;
    }

    .guide p{
        font-size:24px;
        margin:15px 0;
    }
</style>
</head>
<body>

    <div class="navbar">
        <button onclick="location.href='#'">Home</button>
        <button onclick="window.open('https://youtube.com','_blank')">
            Youtube channel
        </button>
    </div>

    <div class="container">
        <h1>BMI Calculator</h1>

        <div class="input-group">
            <label>Height in CM:</label>
            <input type="number" id="height">
        </div>

        <div class="input-group">
            <label>Weight in KG:</label>
            <input type="number" id="weight">
        </div>

        <button class="btn" onclick="calculateBMI()">Calculate</button>

        <div id="result"></div>

        <div class="guide">
            <h2>BMI Weight Guide</h2>

            <p>Under Weight = Less than 18.6</p>
            <p>Normal Range = 18.6 and 24.9</p>
            <p>Overweight = Greater than 24.9</p>
        </div>
    </div>

<script>
function calculateBMI() {
    let height = document.getElementById("height").value;
    let weight = document.getElementById("weight").value;
    let result = document.getElementById("result");

    if(height === "" || height <= 0 || weight === "" || weight <= 0){
        result.innerHTML = "Please enter valid values";
        return;
    }

    let bmi = (weight / ((height * height) / 10000)).toFixed(2);

    let status = "";

    if(bmi < 18.6){
        status = " (Underweight)";
    } else if(bmi <= 24.9){
        status = " (Normal)";
    } else {
        status = " (Overweight)";
    }

    result.innerHTML = `Your BMI: ${bmi}${status}`;
}
</script>

</body>
</html>
